            const { x, y, direction, frameIndex } = dog;

            // Use standing texture when idle, running frames when moving
            let currentTexture;
            let currentBuffer;
            let currentWidth;

            if (dog.state === 'running') {
                currentTexture = dogTextures[frameIndex];
                currentBuffer = dogRunningBuffer;
                currentWidth = dogRunningWidth;
                // Fallback if frame not loaded
                if (!currentTexture) {
                    for (let i = 0; i < dogTextures.length; i++) {
                        if (dogTextures[i]) {
                            currentTexture = dogTextures[i];
                            break;
                        }
                    }
                }
            } else {
                // Idle, grabbing, throwing - use standing pose
                currentTexture = dogStandingTexture;
                currentBuffer = dogStandingBuffer;
                currentWidth = dogStandingWidth;
            }
            if (!currentTexture) return;

            // Throwing rotation
            let rotation = 0;
            if (dog.state === 'throwing') {
                rotation = Math.sin(dog.throwPower * Math.PI * 2) * 0.3 * direction;
            }

            // Draw the dog sprite (flip based on direction)
            drawSprite(currentBuffer, currentTexture, x, y, rotation, direction, 1);

            // If holding a notification, draw it near the mouth (front of dog)
            if (dog.holdingRect) {
                const rect = dog.holdingRect;
                const holdX = x + (currentWidth * 0.35) * direction;
                const holdY = y - 10;
                drawNotification(rect.notifIndex, holdX, holdY, dog.throwAngle * direction, direction, 1);
            }
        }

        function drawGround() {
            const groundBuffer = createRectBuffer(canvas.width, 60, [0.0, 0.0, 0.0]);
            drawRect(groundBuffer, canvas.width / 2, groundY + 30, 0, 1, 1);
        }

        function findNearestRect() {
            let nearest = null;
            let nearestDist = Infinity;

            for (const rect of rectangles) {
                if (rect.grounded) {
                    const dist = Math.abs(rect.x - dog.x);
                    if (dist < nearestDist) {
                        nearestDist = dist;
                        nearest = rect;
                    }
                }
            }
            return nearest;
        }

        function update(deltaTime) {
            dog.animTime += deltaTime;

            // Spawn rectangles
            nextSpawnTime -= deltaTime * 1000;
            if (nextSpawnTime <= 0 && rectangles.length < 5 && !dog.holdingRect) {
                spawnRectangle();
                nextSpawnTime = 2000 + Math.random() * 2000;
            }

            // Update falling rectangles
            for (const rect of rectangles) {
                if (!rect.grounded) {
                    rect.vy += 0.5;
                    rect.y += rect.vy;
                    rect.rotation += 0.02;

                    if (rect.y + rect.height / 2 >= groundY) {
                        rect.y = groundY - rect.height / 2;
                        rect.grounded = true;
                        rect.vy = 0;
                        rect.rotation = 0;
                    }
                }
            }

            // Update flying rectangles
            for (let i = flyingRects.length - 1; i >= 0; i--) {
                const rect = flyingRects[i];
                rect.x += rect.vx;
                rect.y += rect.vy;
                rect.vy += 0.3;
                rect.rotation += rect.vr;

                if (rect.x < -200 || rect.x > canvas.width + 200 || rect.y > canvas.height + 200) {
                    flyingRects.splice(i, 1);
                }
            }

            // Dog AI
            switch (dog.state) {
                case 'idle':
                    const target = findNearestRect();
                    if (target) {
                        dog.targetX = target.x;
                        dog.state = 'running';
                    }
                    break;

                case 'running':
                    const diff = dog.targetX - dog.x;
                    dog.direction = diff > 0 ? 1 : -1;

                    if (Math.abs(diff) > 50) {
                        dog.speed = Math.min(dog.speed + 0.5, dog.maxSpeed);
                        dog.x += dog.direction * dog.speed;

                        // Animate through frames based on speed - faster animation
                        dog.frameTime += deltaTime * 12; // 12 frames per second base
                        if (dog.frameTime >= 1) {
                            dog.frameTime = 0;
                            dog.frameIndex = (dog.frameIndex + 1) % 6;
                        }
                    } else {
                        dog.speed = 0;
                        dog.state = 'grabbing';
                        dog.frameIndex = 0; // Reset to idle frame
                    }
                    break;

                case 'grabbing':
                    // Quick grab
                    const nearest = findNearestRect();
                    if (nearest && Math.abs(nearest.x - dog.x) < 100) {
                        dog.holdingRect = nearest;
                        const idx = rectangles.indexOf(nearest);
                        if (idx !== -1) rectangles.splice(idx, 1);
                        dog.state = 'throwing';
                        dog.throwAngle = 0;
                        dog.throwPower = 0;
                    } else {
                        dog.state = 'idle';
                    }
                    break;

                case 'throwing':
                    dog.throwPower += 0.04;
                    dog.throwAngle = Math.sin(dog.throwPower * 4) * 0.5;

                    if (dog.throwPower >= 1) {
                        // Launch the rectangle!
                        const rect = dog.holdingRect;
                        const launchAngle = -Math.PI / 4 + (Math.random() - 0.5) * 0.5;
                        const power = 22 + Math.random() * 10;

                        flyingRects.push({
                            x: dog.x + (dogWidth * 0.4) * dog.direction,
                            y: dog.y - 20,
                            width: rect.width,
                            height: rect.height,
                            notifIndex: rect.notifIndex,
                            vx: Math.cos(launchAngle) * power * dog.direction,
                            vy: Math.sin(launchAngle) * power,
                            rotation: 0,
                            vr: (Math.random() - 0.5) * 0.4,
                            direction: dog.direction,
                        });

                        dog.holdingRect = null;
                        dog.state = 'idle';
                        dog.throwPower = 0;
                    }
                    break;
            }
        }

        function render() {
            // Hot pink background #FF007A
            gl.clearColor(1.0, 0.0, 0.478, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            drawGround();

            // Draw grounded notifications
            for (const rect of rectangles) {
                drawNotification(rect.notifIndex, rect.x, rect.y, rect.rotation, 1, 1);
            }

            // Draw flying notifications
            for (const rect of flyingRects) {
                drawNotification(rect.notifIndex, rect.x, rect.y, rect.rotation, rect.direction, 1);
            }

            drawDog();
        }

        function gameLoop(time) {
            const deltaTime = (time - lastTime) / 1000;
            lastTime = time;

            if (deltaTime < 0.1) {
                update(deltaTime);
            }
            render();

            requestAnimationFrame(gameLoop);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        });

        // Start the game
        spawnRectangle();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
